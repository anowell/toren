# Toren Configuration

[server]
host = "127.0.0.1"
port = 8787

[ancillaries]
# Segment globs: discover repos as segments
# Any subdirectory matching a glob is automatically a valid segment.
segments = ["examples"]
workspace_root = "workspaces"
# Coding agent to use. Auto-detects from PATH if unset.
# agent = "claude"
# agent = "codex:o3"

[tasks]
# Default task source when an ID is provided without a source prefix
default_source = "beads"

[plugins]
# Directory for user Rhai plugin scripts (default: ~/.toren/plugins)
# dir = "~/.toren/plugins"
# Disable specific plugins by name
# disable = []

[proxy]
domain = "lvh.me"
