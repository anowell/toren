# Toren Configuration

[server]
host = "127.0.0.1"
port = 8787

[ancillaries]
# Segment globs: discover repos as segments
# Any subdirectory matching a glob is automatically a valid segment.
segments = ["examples"]
workspace_root = "workspaces"

[tasks]
# Default task source when an ID is provided without a source prefix
default_source = "beads"

[proxy]
domain = "lvh.me"
